name: Label pending-maintainer PRs

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

jobs:
  check-pending:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.pull_request != null || github.event.pull_request != null
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const MAINTAINER = 'pending-maintainer';
            const CONTRIBUTOR = 'pending-contributor';

            // On comment/review events, only process the affected PR
            // On workflow_dispatch, process all open PRs
            let prNumbers = [];

            if (context.eventName === 'workflow_dispatch') {
              const prs = await github.rest.pulls.list({
                ...context.repo,
                state: 'open',
                per_page: 100
              });
              prNumbers = prs.data.map(pr => pr.number);
            } else if (context.eventName === 'issue_comment') {
              prNumbers = [context.payload.issue.number];
            } else if (context.eventName === 'pull_request_review') {
              prNumbers = [context.payload.pull_request.number];
            }

            for (const prNumber of prNumbers) {
              const { data: pr } = await github.rest.pulls.get({
                ...context.repo,
                pull_number: prNumber
              });

              const { data: comments } = await github.rest.issues.listComments({
                ...context.repo,
                issue_number: prNumber,
                per_page: 1,
                direction: 'desc'
              });

              if (comments.length === 0) continue;

              const lastCommenter = comments[0].user.login;
              const prAuthor = pr.user.login;
              const labels = pr.labels.map(l => l.name);

              if (lastCommenter === prAuthor) {
                if (!labels.includes(MAINTAINER)) {
                  await github.rest.issues.addLabels({
                    ...context.repo,
                    issue_number: prNumber,
                    labels: [MAINTAINER]
                  });
                }
                if (labels.includes(CONTRIBUTOR)) {
                  await github.rest.issues.removeLabel({
                    ...context.repo,
                    issue_number: prNumber,
                    name: CONTRIBUTOR
                  }).catch(() => {});
                }
                console.log(`#${prNumber} — author replied, set ${MAINTAINER}`);
              }
            }

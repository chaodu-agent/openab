{{- range $name, $cfg := .Values.agents }}
{{- $d := dict "ctx" $ "agent" $name "cfg" $cfg }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-broker.agentFullname" $d }}
  labels:
    {{- include "agent-broker.labels" $d | nindent 4 }}
data:
  config.toml: |
    [discord]
    bot_token = "${DISCORD_BOT_TOKEN}"
    allowed_channels = [{{ range $i, $ch := $cfg.discord.allowedChannels }}{{ if $i }}, {{ end }}"{{ $ch }}"{{ end }}]

    [agent]
    command = "{{ $cfg.command }}"
    args = {{ $cfg.args | toJson }}
    working_dir = "{{ $cfg.workingDir }}"
    {{- if $cfg.env }}
    env = { {{ range $k, $v := $cfg.env }}{{ $k }} = "{{ $v }}", {{ end }} }
    {{- end }}

    [pool]
    max_sessions = {{ $cfg.pool.maxSessions }}
    session_ttl_hours = {{ $cfg.pool.sessionTtlHours }}

    [reactions]
    enabled = {{ $cfg.reactions.enabled }}
    remove_after_reply = {{ $cfg.reactions.removeAfterReply }}
  {{- if $cfg.agentsMd }}
  AGENTS.md: |
    {{- $cfg.agentsMd | nindent 4 }}
  {{- end }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-broker
  labels:
    app: agent-broker
spec:
  replicas: 1
  strategy:
    type: Recreate          # PVC is ReadWriteOnce
  selector:
    matchLabels:
      app: agent-broker
  template:
    metadata:
      labels:
        app: agent-broker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: agent-broker
          image: agent-broker:latest
          imagePullPolicy: Never
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-broker-secret
                  key: discord-bot-token
            - name: HOME
              value: /home/agent
          volumeMounts:
            - name: config
              mountPath: /etc/agent-broker
              readOnly: true
            - name: data
              mountPath: /home/agent/.kiro
              subPath: dot-kiro
            - name: data
              mountPath: /home/agent/.local/share/kiro-cli
              subPath: kiro-cli-data
      volumes:
        - name: config
          configMap:
            name: agent-broker-config
        - name: data
          persistentVolumeClaim:
            claimName: agent-broker-data
